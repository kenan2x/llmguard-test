app:
  name: ${APP_NAME:LLM Guard API}
  log_level: ${LOG_LEVEL:DEBUG}
  scan_fail_fast: false
  scan_prompt_timeout: 30
  scan_output_timeout: 30
  lazy_load: false

dynamic_lookup:
  db_type: sqlite
  db_path: ${DYNAMIC_LOOKUP_DB_PATH:./data/masked_assets.db}
  cache_ttl: ${DYNAMIC_LOOKUP_CACHE_TTL:300}

input_scanners:
  - type: Secrets
    params:
      redact_mode: all
  - type: DynamicLookup
    params:
      fail_on_db_error: true
  - type: Anonymize
    params:
      language: "tr"
      entity_types:
        - PERSON
        - LOCATION
        - ORGANIZATION
        - EMAIL_ADDRESS_RE
        - TURKISH_PHONE
        - IBAN_TR
        - TC_KIMLIK
        - TAX_NUMBER_TR
        - CREDIT_CARD_RE
        - IP_ADDRESS
        - UUID
        - URL
        - DATE_TIME
        - PHONE_NUMBER
        - CREDIT_CARD
        - IBAN_CODE
        - CRYPTO
        - EMAIL_ADDRESS
        - TR_LICENSE_PLATE
      use_faker: false
      threshold: 0.4
  - type: Regex
    params:
      patterns:
        - "jdbc:oracle:thin:@//[\\w.\\-]+:\\d+/[\\w.]+"
        - "jdbc:mysql://[\\w.\\-]+(?::\\d+)?/[\\w]+"
        - "jdbc:sqlserver://[\\w.\\-]+(?::\\d+)?(?:;[\\w=]+)*"
        - "jdbc:postgresql://[\\w.\\-]+(?::\\d+)?/[\\w]+"
        - "(?i)(?:Server|Data Source)\\s*=\\s*[^;]+;\\s*(?:Database|Initial Catalog)\\s*=\\s*[^;]+;\\s*(?:User Id|UID)\\s*=\\s*[^;]+;\\s*(?:Password|PWD)\\s*=\\s*[^;]+"
        - "\\b[\\w.-]+\\.bankaadi\\.(?:local|com\\.tr)\\b"
      is_blocked: true
      match_type: search
      redact: true

output_scanners:
  - type: Deanonymize
